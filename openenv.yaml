version: "1.0"

environment:
  name: "EVChargingScheduler"
  description: >
    An RL benchmark for EV charging slot allocation.
    The agent allocates charging slots across vehicles to minimise
    energy cost and lateness while respecting grid limits.
    Features dense per-step rewards, action masking, and an
    algorithmic difficulty curriculum.
  docker_image: "openenv-ev-charging"
  port: 8000

  action_type: "models.Action"
  observation_type: "models.Observation"
  reward_type: "models.Reward"

  endpoints:
    step: "/step"
    reset: "/reset"
    state: "/state"
    tasks: "/tasks"
    grader: "/grader"
    baseline: "/baseline"

  tasks:
    - id: "easy"
      description: "4 ports, 3 vehicles, flat tariff. Allocate charging to meet departure targets."
      difficulty: "easy"
    - id: "medium"
      description: "6 ports, 5 vehicles, time-of-use tariffs, moderate grid limit."
      difficulty: "medium"
    - id: "hard"
      description: "8 ports, 8 vehicles, ToU tariffs, tight grid, charger failures, urgent departures."
      difficulty: "hard"

  max_steps: 48
  reward_range: [-2.0, 3.0]
